<ellipse cx="150" cy="420" rx="38" ry="18" fill="#2d9e2d" transform="rotate(25, 150, 420)"/>
<ellipse cx="85" cy="470" rx="35" ry="17" fill="#4aaa4a" transform="rotate(-20, 85, 470)"/>
<ellipse cx="155" cy="465" rx="33" ry="16" fill="#3a8f3a" transform="rotate(20, 155, 465)"/>
<ellipse cx="100" cy="500" rx="28" ry="14" fill="#2d9e2d" transform="rotate(-15, 100, 500)"/>
<ellipse cx="140" cy="495" rx="28" ry="13" fill="#4aaa4a" transform="rotate(15, 140, 495)"/>
<line x1="90" y1="430" x2="70" y2="415" stroke="#2a7a2a" stroke-width="1.5" opacity="0.5"/>
<line x1="150" y1="420" x2="168" y2="408" stroke="#2a7a2a" stroke-width="1.5" opacity="0.5"/>

<!-- === SMALL PLANT RIGHT === -->
<ellipse cx="550" cy="565" rx="28" ry="9" fill="#5a3e28"/>
<rect x="525" y="550" width="50" height="22" rx="5" fill="#6b4c30"/>
<line x1="550" y1="550" x2="550" y2="490" stroke="#4a7c4a" stroke-width="4" stroke-linecap="round"/>
<ellipse cx="528" cy="500" rx="28" ry="13" fill="#2d9e2d" transform="rotate(-25, 528, 500)"/>
<ellipse cx="572" cy="495" rx="26" ry="12" fill="#3a8f3a" transform="rotate(22, 572, 495)"/>
<ellipse cx="530" cy="525" rx="22" ry="11" fill="#4aaa4a" transform="rotate(-18, 530, 525)"/>
<ellipse cx="568" cy="520" rx="22" ry="11" fill="#2d9e2d" transform="rotate(18, 568, 520)"/>

<!-- Ground / grass strip -->
<ellipse cx="340" cy="580" rx="300" ry="20" fill="#c8eac8" opacity="0.6"/>

<!-- === PERSON === -->
<!-- Shoes -->
<ellipse cx="275" cy="580" rx="28" ry="12" fill="#2d9e2d"/>
<ellipse cx="275" cy="575" rx="24" ry="8" fill="#3aaf3a"/>
<rect x="252" y="568" width="14" height="8" rx="3" fill="white" opacity="0.5"/>
<ellipse cx="355" cy="582" rx="26" ry="10" fill="#2d9e2d"/>
<ellipse cx="355" cy="577" rx="22" ry="7" fill="#3aaf3a"/>
<rect x="334" y="570" width="14" height="8" rx="3" fill="white" opacity="0.5"/>

<!-- Pants -->
<ellipse cx="315" cy="560" rx="65" ry="28" fill="#2a2a3e"/>
<path d="M260,555 Q290,580 315,565 Q340,580 370,555" fill="#2a2a3e"/>

<!-- Hoodie body -->
<rect x="270" y="460" width="95" height="110" rx="20" fill="#3aaf3a"/>
<!-- Pocket -->
<rect x="292" y="530" width="50" height="20" rx="8" fill="#2d9e2d"/>
<!-- Arms -->
<path d="M270,500 Q240,520 245,555" fill="none" stroke="#3aaf3a" stroke-width="28" stroke-linecap="round"/>
<path d="M365,500 Q390,520 385,555" fill="none" stroke="#3aaf3a" stroke-width="26" stroke-linecap="round"/>

<!-- Laptop -->
<rect x="248" y="540" width="140" height="85" rx="6" fill="#c0c0c8"/>
<rect x="254" y="546" width="128" height="72" rx="4" fill="#1a1a2e"/>
<rect x="258" y="550" width="120" height="64" rx="3" fill="#1e3a5f"/>
<rect x="264" y="556" width="40" height="6" rx="2" fill="#4a9a4a" opacity="0.8"/>
<rect x="264" y="566" width="60" height="4" rx="2" fill="#6aaa6a" opacity="0.6"/>
<rect x="264" y="574" width="50" height="4" rx="2" fill="#6aaa6a" opacity="0.5"/>
<rect x="240" y="622" width="158" height="8" rx="4" fill="#a8a8b0"/>
<rect x="232" y="628" width="174" height="5" rx="2" fill="#909098"/>

<!-- Neck -->
<rect x="305" y="445" width="25" height="25" rx="8" fill="#f5c5a0"/>
<!-- Head -->
<ellipse cx="317" cy="430" rx="32" ry="33" fill="#f5c5a0"/>
<!-- Hair -->
<path d="M285,420 Q295,395 317,393 Q340,393 350,412 Q348,400 335,395 Q320,390 305,395 Q290,400 285,420Z" fill="#2a1a0a"/>
<ellipse cx="317" cy="400" rx="25" ry="12" fill="#2a1a0a"/>
<!-- Eyes -->
<ellipse cx="307" cy="428" rx="4" ry="4.5" fill="#2a1a0a"/>
<ellipse cx="328" cy="428" rx="4" ry="4.5" fill="#2a1a0a"/>
<circle cx="309" cy="426" r="1.5" fill="white"/>
<circle cx="330" cy="426" r="1.5" fill="white"/>
<!-- Smile -->
<path d="M306,440 Q317,450 328,440" fill="none" stroke="#c08060" stroke-width="2.5" stroke-linecap="round"/>
<!-- Eyebrows -->
<path d="M302,421 Q307,418 313,421" fill="none" stroke="#2a1a0a" stroke-width="2" stroke-linecap="round"/>
<path d="M323,421 Q328,418 333,421" fill="none" stroke="#2a1a0a" stroke-width="2" stroke-linecap="round"/>
<!-- Ears -->
<ellipse cx="284" cy="432" rx="6" ry="8" fill="#f5c5a0"/>
<ellipse cx="350" cy="432" rx="6" ry="8" fill="#f5c5a0"/>

<!-- Bottom text -->
<text x="340" y="660" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="600" fill="#1a1a2e">Smart Access. Smarter You.</text>
<text x="340" y="690" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#4a7a4a">Secure  •  Simple  •  Seamless</text>
</svg>
