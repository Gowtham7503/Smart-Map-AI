<svg width="100%" viewBox="0 0 680 820" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Smart Access. Smarter You. — Secure, Simple, Seamless</title>
<desc>Illustration of a person sitting with a laptop in front of a large smartphone showing a Welcome Back login screen, surrounded by plants and a city backdrop.</desc>

<defs>
  <clipPath id="phoneClip">
    <rect x="215" y="80" width="220" height="420" rx="30"/>
  </clipPath>
</defs>

<!-- Background card -->
<rect x="20" y="20" width="640" height="760" rx="20" fill="#f0faf0"/>

<!-- Soft background blobs -->
<ellipse cx="480" cy="300" rx="130" ry="120" fill="#c8eac8" opacity="0.5"/>
<ellipse cx="160" cy="350" rx="90" ry="80" fill="#d4edd4" opacity="0.4"/>

<!-- City buildings (background) -->
<rect x="450" y="310" width="30" height="90" rx="3" fill="#b8ddb8"/>
<rect x="488" y="290" width="25" height="110" rx="3" fill="#a8d4a8"/>
<rect x="520" y="320" width="35" height="80" rx="3" fill="#b8ddb8"/>
<!-- Windows -->
<rect x="456" y="318" width="6" height="6" rx="1" fill="#e8f5e8"/>
<rect x="468" y="318" width="6" height="6" rx="1" fill="#e8f5e8"/>
<rect x="456" y="330" width="6" height="6" rx="1" fill="#e8f5e8"/>
<rect x="494" y="300" width="6" height="6" rx="1" fill="#e8f5e8"/>
<rect x="505" y="300" width="6" height="6" rx="1" fill="#e8f5e8"/>
<rect x="494" y="314" width="6" height="6" rx="1" fill="#e8f5e8"/>
<rect x="528" y="328" width="7" height="6" rx="1" fill="#e8f5e8"/>
<rect x="541" y="328" width="7" height="6" rx="1" fill="#e8f5e8"/>

<!-- Paper plane -->
<g transform="translate(530, 120) rotate(-30)">
  <polygon points="0,0 30,12 0,24" fill="#2d9e2d"/>
  <polygon points="0,12 30,12 15,20" fill="#1a7a1a"/>
</g>
<!-- Dotted trail -->
<circle cx="518" cy="132" r="2" fill="#2d9e2d" opacity="0.6"/>
<circle cx="504" cy="148" r="2" fill="#2d9e2d" opacity="0.5"/>
<circle cx="492" cy="166" r="2" fill="#2d9e2d" opacity="0.4"/>
<circle cx="482" cy="186" r="2" fill="#2d9e2d" opacity="0.3"/>

<!-- Cloud -->
<ellipse cx="155" cy="180" rx="32" ry="18" fill="#d8eed8" opacity="0.7"/>
<ellipse cx="175" cy="172" rx="22" ry="16" fill="#d8eed8" opacity="0.7"/>
<ellipse cx="135" cy="175" rx="20" ry="14" fill="#d8eed8" opacity="0.7"/>

<!-- === PHONE === -->
<!-- Phone body shadow -->
<rect x="218" y="84" width="220" height="420" rx="30" fill="#1a1a2e" opacity="0.12"/>
<!-- Phone body -->
<rect x="215" y="80" width="220" height="420" rx="30" fill="#1a1a2e"/>
<!-- Phone screen -->
<rect x="228" y="96" width="194" height="388" rx="18" fill="#ffffff"/>
<!-- Notch -->
<rect x="295" y="80" width="60" height="18" rx="9" fill="#1a1a2e"/>

<!-- Screen content -->
<!-- Shield icon -->
<g transform="translate(340, 190)">
  <path d="M0,-44 C18,-44 38,-36 38,-36 L38,0 C38,22 20,36 0,44 C-20,36 -38,22 -38,0 L-38,-36 C-38,-36 -18,-44 0,-44 Z" fill="#2d9e2d"/>
  <rect x="-14" y="-8" width="28" height="22" rx="4" fill="white"/>
  <path d="M-9,-8 L-9,-18 C-9,-26 9,-26 9,-18 L9,-8" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="0" cy="4" r="5" fill="#2d9e2d"/>
  <rect x="-3" y="4" width="6" height="7" rx="1" fill="#2d9e2d"/>
</g>

<!-- Welcome Back text -->
<text x="325" y="265" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Welcome Back</text>
<text x="325" y="284" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">Let's get you logged in</text>

<!-- Green checkmark circle -->
<g transform="translate(325, 340)">
  <circle cx="0" cy="0" r="26" fill="#2d9e2d"/>
  <path d="M-12,0 L-4,10 L14,-10" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</g>

<!-- === LARGE PLANT LEFT === -->
<ellipse cx="120" cy="565" rx="38" ry="12" fill="#5a3e28"/>
